  <!-- Product name -->
  <text x="400" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#8B4513" font-weight="bold">Pochette multicolore</text>
  <text x="400" y="675" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#2D5016">Fait &#224; la main &#8226; Lom&#233;</text>
