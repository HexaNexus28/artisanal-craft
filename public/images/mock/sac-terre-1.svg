<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#F5EDD6"/>
  <!-- Kente horizontal stripes -->
  <rect x="0" y="10" width="800" height="12" fill="#8B4513" opacity="0.3"/>
  <rect x="0" y="30" width="800" height="6" fill="#C9901A" opacity="0.4"/>
  <rect x="0" y="770" width="800" height="12" fill="#8B4513" opacity="0.3"/>
  <rect x="0" y="790" width="800" height="6" fill="#C9901A" opacity="0.4"/>
  <!-- Rounded bag shape -->
  <ellipse cx="400" cy="420" rx="180" ry="200" fill="none" stroke="#8B4513" stroke-width="5"/>
  <!-- Handle arcs -->
  <path d="M300,260 C300,160 500,160 500,260" fill="none" stroke="#8B4513" stroke-width="5"/>
  <!-- Earth-tone bead pattern: concentric arcs -->
  <path d="M320,350 Q400,300 480,350" fill="none" stroke="#8B4513" stroke-width="3"/>
  <path d="M300,400 Q400,340 500,400" fill="none" stroke="#C9901A" stroke-width="3"/>
  <path d="M290,450 Q400,380 510,450" fill="none" stroke="#8B4513" stroke-width="3"/>
  <path d="M300,500 Q400,430 500,500" fill="none" stroke="#E8D5A3" stroke-width="3"/>
  <path d="M320,540 Q400,480 480,540" fill="none" stroke="#8B4513" stroke-width="3"/>
  <!-- Small beads along arcs -->
  <circle cx="340" cy="345" r="6" fill="#8B4513"/>
  <circle cx="400" cy="320" r="6" fill="#8B4513"/>
  <circle cx="460" cy="345" r="6" fill="#8B4513"/>
  <circle cx="320" cy="395" r="6" fill="#C9901A"/>
  <circle cx="400" cy="360" r="6" fill="#C9901A"/>
  <circle cx="480" cy="395" r="6" fill="#C9901A"/>
  <circle cx="350" cy="535" r="6" fill="#8B4513"/>
  <circle cx="400" cy="505" r="6" fill="#8B4513"/>
  <circle cx="450" cy="535" r="6" fill="#8B4513"/>
  <!-- Product name -->
  <text x="400" y="680" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#8B4513" font-weight="bold">Sac terre cuite</text>
  <text x="400" y="715" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#2D5016">Fait &#224; la main &#8226; Lom&#233;</text>
</svg>